<!DOCTYPE html>
<html lang="es-CR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — Tauro TV | 800+ Películas, Series y Anime</title>
  <meta name="description" content="Explora el catálogo completo de Tauro TV: +800 películas, series y anime en Full HD 1080p. Filtra por categoría y descubre tu próximo contenido favorito.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://taurotv.lat/catalog.html">
  <meta name="theme-color" content="#E50914">
  <link rel="icon" type="image/svg+xml" href="images/logo/logo.svg">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <!-- CSS base del sitio -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/catalog-page.css">
</head>
<body>

<!-- ── Nav simplificada ── -->
<nav class="catalog-nav" aria-label="Navegación">
  <a href="index.html" class="logo" aria-label="Tauro TV — inicio">
    <div class="logo-bull">
      <img src="images/logo/logo.svg" alt="Tauro TV Logo">
    </div>
    <div>
      <div class="logo-text">Tauro TV</div>
      <div class="logo-sub">Catálogo</div>
    </div>
  </a>
  <a href="index.html" class="back-link">← Volver al inicio</a>
</nav>

<!-- ── Header ── -->
<header class="catalog-header">
  <div class="section-label">Catálogo completo</div>
  <h1 class="section-title">800+ títulos.<br><em>Todo en un lugar.</em></h1>
  <p class="section-subtitle">
    Películas, series, anime y contenido infantil. Busca, filtra y encuentra tu próximo favorito.
  </p>
</header>

<!-- ── Barra de búsqueda y filtros ── -->
<div class="catalog-controls">
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="catalog-search" class="search-input" placeholder="Buscar título..." aria-label="Buscar en el catálogo" autocomplete="off">
    <button class="search-clear" id="search-clear" aria-label="Limpiar búsqueda" style="display:none;">✕</button>
  </div>

  <div class="filter-row">
    <button class="filter-tag active" data-filter="all">Todos</button>
    <button class="filter-tag" data-filter="series">Series</button>
    <button class="filter-tag" data-filter="peliculas">Películas</button>
    <button class="filter-tag" data-filter="anime">Anime</button>
    <button class="filter-tag" data-filter="infantil">Infantil</button>
    <button class="filter-tag" data-filter="accion">Acción</button>
    <button class="filter-tag" data-filter="comedia">Comedia</button>
    <button class="filter-tag" data-filter="drama">Drama</button>
    <button class="filter-tag" data-filter="cienciaficcion">Sci-Fi</button>
    <button class="filter-tag" data-filter="terror">Terror</button>
    <button class="filter-tag" data-filter="romance">Romance</button>
    <button class="filter-tag" data-filter="documental">Documental</button>
  </div>

  <div class="catalog-count" id="catalog-count" aria-live="polite"></div>
</div>

<!-- ── Grid del catálogo ── -->
<main class="catalog-main">
  <div class="catalog-grid" id="catalog-grid">
    <!-- Cards se generan por JS -->
  </div>

  <!-- Loading state -->
  <div class="catalog-loading" id="catalog-loading">
    <div class="loader"></div>
    <p>Cargando catálogo...</p>
  </div>

  <!-- Empty state -->
  <div class="catalog-empty" id="catalog-empty" style="display:none;">
    <p>No se encontraron títulos con ese filtro.</p>
  </div>
</main>

<!-- ── Footer mini ── -->
<footer class="catalog-footer">
  <p>© 2026 Tauro TV · <a href="index.html">Volver al inicio</a> · <a href="index.html#pricing">Ver planes</a></p>
</footer>

<!-- Scripts -->
<script src="catalog-data.js"></script>
<script src="js/catalog-app.js"></script>
</body>
</html>
